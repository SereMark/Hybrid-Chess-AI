name: CI
run-name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows build and test
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build native chess core
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DPython3_EXECUTABLE="$env:pythonLocation\python.exe"
          cmake --build build --config Release --parallel

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src\python"
          python -m pytest -q

      - name: Run lint checks
        shell: pwsh
        run: |
          python -m ruff check src/python tests
          python -m black --check src/python tests

      - name: Run type checks
        shell: pwsh
        run: |
          python -m mypy
